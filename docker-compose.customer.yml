version: '3.9'

# Self-hosted customer deployment — use Caddy for HTTPS termination
# Bước 1: set DOMAIN và LICENSE_KEY trong .env
# Bước 2: docker compose -f docker-compose.customer.yml up -d
# Caddyfile tự động lấy TLS từ Let's Encrypt

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zalomonitor}
      POSTGRES_USER: ${POSTGRES_USER:-zalomonitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zalomonitor}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-zalomonitor}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-zalomonitor}
      REDIS_URL: redis://redis:6379
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?must be set}
      JWT_SECRET: ${JWT_SECRET:?must be set}
      SUPER_ADMIN_TOKEN: ${SUPER_ADMIN_TOKEN:?must be set}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ADMIN_NAME: ${ADMIN_NAME:-Support}
      ADMIN_ZALO: ${ADMIN_ZALO:-}
      ADMIN_TELEGRAM: ${ADMIN_TELEGRAM:-}
      PUBLIC_BACKEND_URL: https://api.${DOMAIN:?must be set}
      DASHBOARD_URL: https://${DOMAIN:?must be set}
      NODE_ENV: production
      OPENCLAW_CONTAINER: ${OPENCLAW_CONTAINER:-openclaw}
      LICENSE_KEY: ${LICENSE_KEY:?must be set}
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker-compose.customer.yml:/app/docker-compose.customer.yml:ro
      - ./.env.customer.example:/app/.env.customer.example:ro

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.${DOMAIN:?must be set}
        NEXT_PUBLIC_WS_URL:  wss://api.${DOMAIN:?must be set}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://api.${DOMAIN:?must be set}
      NEXT_PUBLIC_WS_URL:  wss://api.${DOMAIN:?must be set}

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:?must be set}
    depends_on:
      - backend
      - dashboard

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
