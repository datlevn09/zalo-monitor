version: '3.9'

# NAS deploy — không có Caddy, dùng port trực tiếp
# Chạy: DOMAIN=192.168.2.175 docker compose -f docker-compose.nas.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zalomonitor}
      POSTGRES_USER: ${POSTGRES_USER:-zalomonitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zalomonitor}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-zalomonitor}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-zalomonitor}
      REDIS_URL: redis://redis:6379
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?must be set}
      JWT_SECRET: ${JWT_SECRET:?must be set}
      SUPER_ADMIN_TOKEN: ${SUPER_ADMIN_TOKEN:?must be set}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ADMIN_NAME: ${ADMIN_NAME:-Support}
      ADMIN_ZALO: ${ADMIN_ZALO:-}
      ADMIN_TELEGRAM: ${ADMIN_TELEGRAM:-}
      PUBLIC_BACKEND_URL: http://${DOMAIN:-192.168.2.175}:3001
      NODE_ENV: production
      OPENCLAW_CONTAINER: ${OPENCLAW_CONTAINER:-openclaw}
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://${DOMAIN:-192.168.2.175}:3001
        NEXT_PUBLIC_WS_URL:  ws://${DOMAIN:-192.168.2.175}:3001
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://${DOMAIN:-192.168.2.175}:3001
      NEXT_PUBLIC_WS_URL:  ws://${DOMAIN:-192.168.2.175}:3001

volumes:
  postgres_data:
  redis_data:
