version: '3.9'

# Production docker-compose với Caddy reverse proxy + auto HTTPS
# Dùng: DOMAIN=dashboard.khach.com docker compose -f docker-compose.prod.yml up -d

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      - backend
      - dashboard

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zalomonitor}
      POSTGRES_USER: ${POSTGRES_USER:-zalomonitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zalomonitor}"]
      interval: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-zalomonitor}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-zalomonitor}
      REDIS_URL: redis://redis:6379
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?must be set}
      JWT_SECRET: ${JWT_SECRET:?must be set}
      SUPER_ADMIN_TOKEN: ${SUPER_ADMIN_TOKEN:?must be set}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ADMIN_NAME: ${ADMIN_NAME:-Support}
      ADMIN_ZALO: ${ADMIN_ZALO:-}
      ADMIN_TELEGRAM: ${ADMIN_TELEGRAM:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      PUBLIC_BACKEND_URL: https://${DOMAIN}/api
      NODE_ENV: production
      OPENCLAW_CONTAINER: ${OPENCLAW_CONTAINER:-openclaw}
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  dashboard:
    build: ./dashboard
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://${DOMAIN}/api
      NEXT_PUBLIC_WS_URL:  wss://${DOMAIN}/ws

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
